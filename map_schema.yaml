        children:
        - label: OP Drug Perturbation
          desc: 'Single-cell RNA-seq. Ex-vivo drug perturbation cohort (3 donors, ages 45-52, 2 M / 1 F). ~150 drugs at 24h
            timepoint. No pseudobulk available. Use condition and is_control columns to define comparisons. Cells: 299,045
