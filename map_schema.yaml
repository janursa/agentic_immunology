          Genes: 11,606 obs columns: donor_id, age, sex, condition, is_control, is_positive_control, dose_uM, timepoint_hr,
          cell_type, plate_name, well, row, col, container_format, hashtag_id, raw_cell_id, cell_id, split, dataset, donor_age,
