    - id: SS_immune_aging_tf_signatures_minor_celltypes_csv
      label: Aging TF Signatures — Minor
      type: sumstat
      desc: 'Per-TF aging statistics across 11 minor (sub) immune cell types (CD16_NK, Classic_MONO, MAIT, Memory_B, Naive_B,
        NonClassic_MONO, Tcm_Naive_CD4, Tcm_Naive_CD8, Tem_Effector_CD4, Tem_Temra_CD8, Tem_Trm_CD8) from multi-cohort TF
        activity analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style="color:#8b949e;font-size:11px">Load:
        <code>retrieve_summary_stats(''aging'', cell_resolution=''minor'')</code></span>'
    - id: SS_immune_aging_gene_expression_signatures_major_celltypes_csv
      label: Aging Gene Expression Signatures
      type: sumstat
      desc: 'Per-gene aging statistics across 5 major immune cell types from multi-cohort bulk gene expression analysis (cohorts:
        onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style="color:#8b949e;font-size:11px">Load: <code>retrieve_summary_stats(''aging'',
        feature_type=''gene_expression'')</code></span>'
    - id: SS_immune_aging_ccc_signatures_major_celltypes_csv
      label: Aging Cell-Cell Communication
      type: sumstat
      desc: 'Cell-cell communication (L-R pair) aging statistics across major immune cell types (LIANA rank_aggregate). The
        `gene` column encodes interactions as `source_ct__ligand__target_ct__receptor` (double underscore) — parse in your
        analysis.<br><span style="color:#8b949e;font-size:11px">Load: <code>retrieve_summary_stats(''aging'', feature_type=''ccc'')</code></span>'
    - id: SS_sle_tf_signatures_major_celltypes_csv
      label: SLE TF Signatures
