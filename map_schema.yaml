  - id: DCAT_kg
    label: 🕸️ KG
    type: data_cat
    desc: Large-scale knowledge graphs for biomedical reasoning.
    children:
    - id: DKG_0
      label: PrimeKG — Precision Medicine Knowledge Graph
      desc: A multiplex biomedical knowledge graph integrating 20 high-quality databases across 10 biological scales.
      filename: PrimeKG.csv
  - id: DCAT_nichenet
    label: 📡 NicheNet
    type: data_cat
    desc: NicheNet v2 prior model networks for cell-cell communication analysis.
    children:
    - id: DNN_0
      label: Core Networks
      desc: ''
      children:
      - label: Ligand-Receptor Network
        desc: '4,986 ligand-receptor pairs. Columns: `from` (ligand), `to` (receptor), `database`, `source`. Source databases
          include CellChat, CellPhoneDB, ICELLNET, NicheNet v1, connectomeDB2020, and others. This is the entry layer of the
          NicheNet prior: the set of all possible extracellular L-R interactions.'
      - label: Intracellular Signaling Network
        desc: '5,169,518 directed edges. Columns: `from`, `to`, `source`, `database`. Represents the intracellular signaling
          paths that connect receptor activation to downstream molecules and TFs. Sources include OmniPath, Reactome, KEGG,
          PhosphoSitePlus, SIGNOR, and others. This is the middle layer: receptor → signaling cascade.'
      - label: Gene Regulatory Network
        desc: '5,870,450 directed TF→target edges. Columns: `from` (TF), `to` (target gene), `source`, `database`. Represents
          the transcriptional regulation layer. Sources include DoRothEA, TRRUST, RegNetwork, ENCODE, and ChIP-Atlas. This
          is the final layer: TF → target gene expression.'
    - id: DNN_1
      label: Weighted Networks
      desc: ''
      children:
      - label: Weighted Prior Network
        desc: 'The NicheNet prior model after empirical calibration. Edges from the signaling and GR networks are weighted
          by how well they predict observed gene expression changes in ~600 published perturbation experiments. Two tables:
          - `weighted_networks_lr_sig.parquet`: 3,923,501 weighted L-R + signaling edges (`from`, `to`, `weight`) - `weighted_networks_gr.parquet`:
          4,640,268 weighted GR edges (`from`, `to`, `weight`)'
      - label: Ligand → TF Weight Matrix
        desc: 33,354 ligands × 1,226 TFs. Each value = how strongly a ligand is predicted to regulate a given TF, based on
          path traversal through the weighted prior network. Rows = ligands (with a `ligand` column added), columns = TF names.
          Use to identify which ligands most likely drive observed TF activity changes.
      - label: Ligand → Target Gene Weight Matrix (long format)
        desc: '34,326,358 rows. Columns: `ligand`, `target`, `weight`. Originally a 33,354 × 1,226 dense matrix, converted
          to long format (non-zero weights only) for efficient storage (353MB parquet vs. 250MB RDS). Each row = predicted
          regulatory influence of a ligand on a target gene. This is the primary output used in NicheNet ligand activity analysis.'
  - id: DCAT_virtualbiotech
    label: 💊 VirtualBiotech
    type: data_cat
    desc: Data from the Virtual Biotech study (Zhang et al. 2026). Clinical trial outcomes and target-level biology.
    children:
    - id: DVB_0
      label: Clinical Trial Outcome Labels
      desc: 56,707 clinical trials from ClinicalTrials.gov with LLM-curated outcome labels. The most valuable piece of the
        dataset — extracting these from raw trial text is what the paper's main contribution is. Columns include trial phase,
        status (Active/Terminated/Withdrawn/Suspended), stop reason and category, primary/secondary endpoint result (POSITIVE/NEGATIVE/MIXED/NA),
        Phase I→II progression flag, and adverse event rates by organ system.
      filename: clinical_trial_labels.csv
    - id: DVB_1
      label: ChEMBL NCT–Target Mapping
      desc: '488,361 rows mapping NCT trial IDs to drug targets (Ensembl gene IDs) and diseases (EFO IDs + disease name) via
        ChEMBL. The bridge between trial labels and gene-level biology. Key columns: `nct_id`, `targetId` (Ensembl), `diseaseId`
        (EFO), `disease_name`, `drugId` (ChEMBL), `phase`, `status`, `mechanism_of_action`.'
      filename: chembl_clinical_nct_data.parquet
    - id: DVB_2
      label: SC Target Features
      desc: Precomputed single-cell expression features for 1,511 human target genes derived from the Tabula Sapiens healthy
        human atlas. 127 columns covering cell-type and tissue specificity (tau), bimodality, cell-type-specific expression
        per 62 cell types, predicted AE risk per organ system, and composite attrition/safety risk scores. This is the gene-level
        feature table used in all regression analyses — see `summary_stats/virtualbiotech/target_sc_features.csv` for a leaner
        version with the key columns only.
      filename: comprehensive_features_aggregated_v2_optimized.parquet
    - id: DVB_3
      label: Tahoe-100M Drug Efficacy Features
      desc: '2.9M rows of functional drug efficacy scores from the Tahoe-100M perturbation atlas — drugs tested across cancer
        cell lines at multiple concentrations. Long-format: one row per drug × cell line × concentration × feature. Feature
        types include pan-cancer functional scores (apoptosis, proliferation suppression, cell cycle arrest, DNA damage, stress
        response) and scores stratified by mutation context (KRAS/TP53/PIK3CA/BRAF mutant vs wild-type). **Cancer-only**;
        links drugs not targets directly. Not yet used in our analyses.'
      filename: tahoe_efficacy_features_long.parquet
