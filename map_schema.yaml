  - id: SS_virtualbiotech
    label: VirtualBiotech
    type: sumstat_group
    desc: Summary stats from the virtualbiotech module (3 files).
    children:
    - id: SS_virtualbiotech_target_sc_features_csv
      label: Target expression features
      type: sumstat
      desc: 'Expression features precomputed from the Tabula Sapiens healthy human atlas. Covers expression specificity, bimodality,
        and predicted AE risk per organ system. Key columns: - `ensembl_id` — Ensembl gene ID - `tau_cell_type`, `tau_cell_type_max/min`
        — cell-type specificity (0 = ubiquitous, 1 = one cell type only) - `tissue_tau` — tissue-level specificity - `bimodality_score`
        — on/off expression pattern across cells (higher = cleaner switch) - `ae_risk_cardiac/hepatic/renal/neural/...` —
        predicted adverse event risk per organ system - `attrition_risk_phase1/2/3` — predicted trial attrition risk per phase
        - `overall_safety_risk`, `multi_system_ae_count` — composite safety metrics ---'
    - id: SS_virtualbiotech_target_clinical_success_overall_csv
      label: Target clinical success overall
      type: sumstat
      desc: 'Empirical trial outcome rates per target gene across all diseases, derived from 56,707 ChEMBL-mapped trials.
        Key columns: - `targetId` — Ensembl gene ID - `targetFromSourceId` — UniProt ID - `n_trials` — number of trials involving
        this target - `pct_reached_phase3` — % of trials that reached Phase III+ - `pct_terminated`, `pct_withdrawn` — % stopped
        prematurely - `pct_endpoint_either` — % with positive primary or secondary endpoint - `pct_phase1_to_phase2` — % of
        Phase I trials that progressed to Phase II ---'
    - id: SS_virtualbiotech_target_clinical_success_by_disease_csv
      label: Target clinical success by disease
      type: sumstat
      desc: 'Same as above but stratified by `disease_name` from ChEMBL. Useful for target-disease-specific queries, e.g.
        "how does EGFR perform in lung cancer vs breast cancer?" Key columns: same as overall file plus `disease_name`.'
- id: CAT_KNOWHOW
  label: 📚 Know-How
  desc: Methodology guides and workflow documentation for common agentic tasks.
  children:
  - id: KH_computing_sbatch
    label: 'Computing: Running Jobs with SBATCH'
    type: knowhow
    desc: 'Use SLURM `sbatch` to run long or heavy jobs on the cluster instead of running them interactively. Edit them based
      on given task. CRITICAL: if you submit a job using sbatch, keep an eye on it (monitor every 10 mins), and continue the
      pipeline once it''s finished.'
  - id: KH_drug_screening
    label: Drug Screening for Immune Aging / Disease
    type: knowhow
    desc: Covers the workflow for nominating and prioritizing drug candidates targeting immune aging or immune-mediated disease,
      using available data lake resources.
  - id: KH_single_cell_rna_analysis
    label: Single-Cell RNA-seq Analysis
    type: knowhow
    desc: 'Covers the full scRNA-seq workflow: QC → Cell Type Annotation → TF Activity → GRN Inference.'
- id: CAT_IMAGES
