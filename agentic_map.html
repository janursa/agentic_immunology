<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agentic Ecosystem Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #e6edf3;
  }
  #title {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 17px; font-weight: 700; color: #58a6ff;
    letter-spacing: 1px; pointer-events: none; z-index: 10;
    text-shadow: 0 0 20px rgba(88,166,255,0.4);
  }
  #legend {
    position: absolute; bottom: 18px; left: 18px;
    background: rgba(22,27,34,0.95); border: 1px solid #30363d;
    border-radius: 10px; padding: 12px 16px; font-size: 12px; z-index: 10;
  }
  #legend h4 { color: #8b949e; margin-bottom: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  #tooltip {
    position: absolute; pointer-events: none;
    background: rgba(22,27,34,0.97); border: 1px solid #30363d;
    border-radius: 8px; padding: 11px 14px;
    font-size: 12px; max-width: 300px; line-height: 1.55;
    z-index: 100; display: none;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  }
  #tooltip .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
  #tooltip .tt-badge { display: inline-block; font-size: 10px; padding: 1px 7px;
    border-radius: 10px; margin-bottom: 6px; font-weight: 600; }
  #tooltip .tt-desc  { color: #c9d1d9; }
  #controls {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 8px; z-index: 10;
  }
  #search-wrap {
    position: absolute; top: 16px; left: 16px; z-index: 10;
  }
  #search {
    background: #21262d; border: 1px solid #30363d; color: #e6edf3;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; width: 180px;
    outline: none;
  }
  #search::placeholder { color: #8b949e; }
  button {
    background: #21262d; border: 1px solid #30363d; color: #e6edf3;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: background 0.2s;
  }
  button:hover { background: #30363d; }
  svg { width: 100vw; height: 100vh; }
  .node { cursor: grab; }
  .node:active { cursor: grabbing; }
  .node circle { stroke-width: 2px; }
  .node text { pointer-events: none; user-select: none; }
  .link { stroke-opacity: 0.3; }
  .link-category { stroke-opacity: 0.55; }
  .link-dependency { stroke-opacity: 0.5; stroke-dasharray: 5,4; }
  .node.dimmed circle { opacity: 0.15; }
  .node.dimmed text  { opacity: 0.1; }
  .link.dimmed { opacity: 0.05; }
</style>
</head>
<body>
<div id="title">🧬 Agentic Ecosystem Map</div>
<div id="search-wrap"><input id="search" type="text" placeholder="🔍 Search nodes…"></div>
<div id="tooltip"></div>
<div id="controls">
  <button onclick="resetZoom()">⟳ Reset</button>
  <button onclick="toggleLabels()">🏷 Labels</button>
  <button onclick="relaxAll()">💫 Shake</button>
</div>
<div id="legend">
  <h4>Node Types</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#ff7b72"></div><span>LLM Core</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#79c0ff"></div><span>Category</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#56d364"></div><span>biomni Tool</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div><span>CIIM Tool</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffa657"></div><span>Data Category</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#e3b341"></div><span>Dataset / Group</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#f778ba"></div><span>Summary Stats</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#d2a8ff"></div><span>Know-How</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div><span>Singularity Image</span></div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid #30363d;color:#8b949e;font-size:10px">
    ─ ─  dependency link
  </div>
</div>
<svg id="graph"></svg>
<script>
const NODES = [{"id": "LLM", "label": "\ud83e\uddec LLM\nCore", "type": "core", "r": 44, "desc": "Central AI agent orchestrating all tools, data lake resources, know-how, and compute environments in the agentic ecosystem."}, {"id": "CAT_TOOLS", "label": "\ud83d\udd27 Tools", "type": "category", "r": 30, "desc": "Python tool modules for genomics, immunology, pharmacology, literature, databases, and genetics."}, {"id": "CAT_DATA", "label": "\ud83d\udcca Data Lake", "type": "category", "r": 30, "desc": "Curated biomedical datasets: raw scRNA-seq cohorts, OmniPath signaling, and general reference databases."}, {"id": "CAT_SUMSTATS", "label": "\ud83d\udcc8 Summary Stats", "type": "category", "r": 30, "desc": "Precomputed CIIM signature files: aging, SLE, drug, cytokine TF/gene expression/CCC statistics and immune GRN models. Loaded via retrieve_summary_stats() or get_immune_grn()."}, {"id": "CAT_KNOWHOW", "label": "\ud83d\udcda Know-How", "type": "category", "r": 30, "desc": "Methodology guides and workflow documentation for common agentic tasks."}, {"id": "CAT_IMAGES", "label": "\ud83d\udc33 Images", "type": "category", "r": 30, "desc": "Singularity container images with pre-installed environments for all tool modules."}, {"id": "CAT_BIOMNI", "label": "Biomni", "type": "tool_group", "r": 20, "desc": "Biomni tool suite \u2014 6 modules covering databases, genetics, genomics, immunology, literature, and pharmacology."}, {"id": "CAT_CIIM", "label": "CIIM", "type": "tool_group", "r": 20, "desc": "CIIM tool suite \u2014 2 modules for immune single-cell genomics and HIaRA aging clock analysis."}, {"id": "T_BIOMNI_database_biomni", "label": "Biomedical DB APIs", "type": "tool", "r": 15, "desc": "Queries 30+ biomedical REST APIs using natural language or direct endpoints.<br><br><span style='color:#8b949e;font-size:11px'>Functions (41): database_biomni, query_uniprot, query_alphafold, query_interpro, query_pdb + 36 more</span>", "module": "database_biomni", "nfuncs": 41}, {"id": "T_BIOMNI_genetics_biomni", "label": "Genetics & CRISPR", "type": "tool", "r": 15, "desc": "Liftover, fine-mapping, CRISPR analysis, TF binding site identification, phylogenetic analysis.<br><br><span style='color:#8b949e;font-size:11px'>Functions (10): genetics_biomni, liftover_coordinates, bayesian_finemapping_with_deep_vi, analyze_cas9_mutation_outcomes, analyze_crispr_genome_editing + 5 more</span>", "module": "genetics_biomni", "nfuncs": 10}, {"id": "T_BIOMNI_genomics_biomni", "label": "Single-Cell Genomics", "type": "tool", "r": 15, "desc": "scRNA-seq cell type annotation, batch integration, gene set enrichment, ChIP-seq, embeddings.<br><br><span style='color:#8b949e;font-size:11px'>Functions (22): genomics_biomni, annotate_celltype_scRNA, annotate_celltype_with_panhumanpy, create_scvi_embeddings_scRNA, create_harmony_embeddings_scRNA + 17 more</span>", "module": "genomics_biomni", "nfuncs": 22}, {"id": "T_BIOMNI_immunology_biomni", "label": "Immunology Assays", "type": "tool", "r": 15, "desc": "ATAC-seq, immune cell phenotyping, cytokine assays, flow cytometry, histology.<br><br><span style='color:#8b949e;font-size:11px'>Functions (11): immunology_biomni, analyze_atac_seq_differential_accessibility, analyze_bacterial_growth_curve, isolate_purify_immune_cells, estimate_cell_cycle_phase_durations + 6 more</span>", "module": "immunology_biomni", "nfuncs": 11}, {"id": "T_BIOMNI_literature_biomni", "label": "Literature Search", "type": "tool", "r": 15, "desc": "PubMed/arXiv/Scholar search, paper/supplementary retrieval, web search, PDF extraction.<br><br><span style='color:#8b949e;font-size:11px'>Functions (9): literature_biomni, fetch_supplementary_info_from_doi, query_arxiv, query_scholar, query_pubmed + 4 more</span>", "module": "literature_biomni", "nfuncs": 9}, {"id": "T_BIOMNI_pharmacology_biomni", "label": "Drug & Pharmacology", "type": "tool", "r": 15, "desc": "Molecular docking (DiffDock, Vina), ADMET prediction, drug-drug interactions (DDInter), FDA data, drug repurposing (TxGNN).<br><br><span style='color:#8b949e;font-size:11px'>Functions (26): pharmacology_biomni, run_diffdock_with_smiles, docking_autodock_vina, run_autosite, retrieve_topk_repurposing_drugs_from_disease_txgnn + 21 more</span>", "module": "pharmacology_biomni", "nfuncs": 26}, {"id": "T_CIIM_genomics", "label": "Genomics", "type": "tool_ciim", "r": 15, "desc": "Raw counts detection, CellTypist annotation, ULM annotation, GRN loader & inference, scRNA QC, annotation quality, TF activity inference.<br><br><span style='color:#8b949e;font-size:11px'>Functions (9): genomics, identify_counts_layer, annotate_celltype_celltypist, annotate_celltype_ulm, get_immune_grn + 4 more</span>", "module": "genomics", "nfuncs": 9}, {"id": "T_CIIM_hiara", "label": "HIaRA", "type": "tool_ciim", "r": 15, "desc": "GRN-based immune age prediction (CD4T/CD8T) and unified loader for all immune signatures (aging, SLE, drug, cytokine).<br><br><span style='color:#8b949e;font-size:11px'>Functions (3): hiara, predict_immune_age_grn_clock, retrieve_summary_stats</span>", "module": "hiara", "nfuncs": 3}, {"id": "DCAT_omics", "label": "\ud83e\uddeb Omics", "type": "data_cat", "r": 20, "desc": "PBMC gene expression data (single-cell and pseudobulk) across healthy aging cohorts, disease conditions and perturbations (SLE, drug/cytokine perturbation)."}, {"id": "DCAT_prior", "label": "\ud83d\udccb Prior", "type": "data_cat", "r": 20, "desc": "Curated reference files: immune cell type marker genes (major + minor levels) and a list of 1,638 human transcription factors."}, {"id": "DCAT_omnipath", "label": "\ud83d\udd17 OmniPath", "type": "data_cat", "r": 20, "desc": "Signaling network data pulled from the OmniPath REST API. Covers directed protein interactions, kinase-substrate phosphorylation edges, ligand-receptor interactions, intercellular role annotations, and DoRothEA TF regulons."}, {"id": "DCAT_biomni", "label": "\ud83d\uddc4\ufe0f Biomni", "type": "data_cat", "r": 20, "desc": "Large collection of general biomedical reference databases sourced from Biomni: drug binding affinities, CRISPR gene effect screens, gene-disease associations, protein-protein interactions, GWAS, gene sets (MSigDB, MouseMine, GO), TCR sequences, miRNA targets, and more."}, {"id": "DO_aida", "label": "AIDA", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. Multi-ethnic Asian healthy PBMC cohort (625 donors, ages 19-77, 350 F / 275 M). Cells: 1,265,245 | Genes: 13,772 obs columns: donor_id, age, sex, race, batch_info, dataset, donor_age, bulk_group, Major_CT, Sub_CT, ct_major_published, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes, orig.ident<br><br><span style='color:#8b949e;font-size:11px'>Variants: AIDA Single-Cell, AIDA Bulk, AIDA Bulk Minor</span>"}, {"id": "DO_abf300", "label": "ABF300", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. Healthy PBMC cohort (166 donors, ages 25-81, 36 F / 130 M). Cells: 1,916,367 | Genes: 15,437 obs columns: donor_id, age, sex, batch_info, ct_major_published, dataset, donor_age, bulk_group, Major_CT, Sub_CT, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes, orig.ident<br><br><span style='color:#8b949e;font-size:11px'>Variants: ABF300 Single-Cell, ABF300 Bulk, ABF300 Bulk Minor</span>"}, {"id": "DO_onek1k", "label": "OneK1K", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. Australian European healthy PBMC cohort (981 donors, ages 19-97, 565 F / 416 M). Cells: 1,248,940 | Genes: 9,894 obs columns: donor_id, age, sex, batch_info, ct_major_published, dataset, donor_age, bulk_group, Major_CT, Sub_CT, nCount_RNA, nFeature_RNA, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes, orig.ident<br><br><span style='color:#8b949e;font-size:11px'>Variants: OneK1K Single-Cell, OneK1K Bulk, OneK1K Bulk Minor</span>"}, {"id": "DO_perez_sle", "label": "Perez SLE", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. SLE patients and healthy controls (261 donors, ages 20-83, 244 F / 17 M; European, Asian, African American, Hispanic). Use condition column to split cases (systemic lupus erythematosus) vs controls (normal). Cells: 1,263,676 | Genes: 11,918 obs columns: donor_id, age, sex, race, condition, disease_state, batch_info, ct_major_published, dataset, donor_age, bulk_group, Major_CT, Sub_CT, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes, orig.ident<br><br><span style='color:#8b949e;font-size:11px'>Variants: Perez SLE Single-Cell, Perez SLE Bulk, Perez SLE Bulk Minor</span>"}, {"id": "DO_zhang", "label": "Zhang", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. Broad age-range healthy PBMC cohort (61 donors, ages 0-90, 32 M / 29 F; pediatric to elderly). Cells: 538,266 | Genes: 14,468 obs columns: donor_id, age, sex, batch_info, ct_major_published, dataset, donor_age, bulk_group, Major_CT, Sub_CT, nCount_RNA, nFeature_RNA, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes, orig.ident<br><br><span style='color:#8b949e;font-size:11px'>Variants: Zhang Single-Cell, Zhang Bulk, Zhang Bulk Minor</span>"}, {"id": "DO_CXCL9", "label": "CXCL9", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. Ex-vivo cytokine/drug stimulation cohort (7 donors, ages 25-31, 4 F / 3 M). Conditions: rhCXCL9, rhIFN-gamma, LPS, metformin, ruxolitinib, and combinations (24h timepoint). Cells: 253,390 | Genes: 17,011 obs columns: donor_id, age, sex, condition, treatment_id, batch_info, pool_id, donor_letter, dataset, donor_age, bulk_group, Major_CT, Sub_CT, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes, orig.ident<br><br><span style='color:#8b949e;font-size:11px'>Variants: CXCL9 Single-Cell, CXCL9 Bulk, CXCL9 Bulk Minor</span>"}, {"id": "DO_op", "label": "OP Drug", "type": "data", "r": 11, "desc": "Single-cell RNA-seq. Ex-vivo drug perturbation cohort (3 donors, ages 45-52, 2 M / 1 F). ~150 drugs at 24h timepoint. No pseudobulk available. Use condition and is_control columns to define comparisons. Cells: 299,045 | Genes: 11,606 obs columns: donor_id, age, sex, condition, is_control, is_positive_control, dose_uM, timepoint_hr, cell_type, plate_name, well, row, col, container_format, hashtag_id, raw_cell_id, cell_id, split, dataset, donor_age, bulk_group, Major_CT, Sub_CT, n_genes_by_counts, total_counts, total_counts_mt, pct_counts_mt, n_genes<br><br><span style='color:#8b949e;font-size:11px'>Variants: OP Drug Perturbation</span>"}, {"id": "DP_marker_genes_json", "label": "Immune Marker Genes", "type": "data", "r": 11, "desc": "Curated immune cell type marker genes. Two levels: - Major (10 lineages): CD4T, CD8T, NK, B, MONO, DC, HSC, Megakaryocyte, Erythroid, ILC - Minor (22 subtypes): Tcm_Naive_CD4, Tem_Effector_CD4, Treg, Tcm_Naive_CD8, Tem_Temra_CD8, Tem_Trm_CD8, MAIT, CD8a/a, CD16_NK, NK, Naive_B, Memory_B, Aged_B, Bcells, Plasma_B, Plasmablasts_B, Classic_MONO, NonClassic_MONO, pDC, DC1, DC2, Platelet"}, {"id": "DP_tf_all_csv", "label": "Human TF List", "type": "data", "r": 11, "desc": "List of 1,638 human transcription factors."}, {"id": "DOP_interactions_directed_tsv", "label": "Directed PPI", "type": "data", "r": 11, "desc": "Directed post-translational protein interactions (85,217 rows). Columns: source, target, source_genesymbol, target_genesymbol, is_directed, is_stimulation, is_inhibition, consensus_stimulation, consensus_inhibition, sources (contributing DBs), references, curation_effort. Sources include SIGNOR, HPRD, PhosphoSite, ProtMapper, iPTMnet, SPIKE, KEA, and ~15 others."}, {"id": "DOP_enzyme_substrate_tsv", "label": "Kinase-Substrate", "type": "data", "r": 11, "desc": "Kinase/enzyme to substrate phosphorylation sites (41,506 rows). Columns: enzyme, enzyme_genesymbol, substrate, substrate_genesymbol, residue_type, residue_offset, modification (phosphorylation 94%, dephosphorylation, acetylation, methylation, etc.), sources, references."}, {"id": "DOP_intercell_annotations_tsv", "label": "Intercellular Roles", "type": "data", "r": 11, "desc": "Per-gene intercellular role annotations from multiple databases (388,239 rows). Columns: category, parent, database, genesymbol, entity_type, consensus_score, transmitter, receiver, secreted, plasma_membrane_transmembrane. Useful for classifying signaling nodes as receptors, ligands, etc."}, {"id": "DOP_intercell_tsv", "label": "Intercell Summary", "type": "data", "r": 11, "desc": "Compact intercellular annotation table (9 rows). Subset or summary of intercell_annotations.tsv."}, {"id": "DOP_ligrec_interactions_tsv", "label": "Ligand-Receptor", "type": "data", "r": 11, "desc": "Ligand-receptor interaction pairs (6,890 rows). Columns: source, target, source_genesymbol, target_genesymbol, is_directed, is_stimulation, is_inhibition, consensus_direction, and others. Use to identify upstream ligand-receptor pairs driving signaling."}, {"id": "DOP_dorothea_tf_regulon_tsv", "label": "TF Regulons", "type": "data", "r": 11, "desc": "DoRothEA TF to target gene regulons (15,267 rows). Directed, with is_stimulation/is_inhibition flags."}, {"id": "DBG_DDInter_Drug_Drug", "label": "DDInter Drug-Drug", "type": "data", "r": 11, "desc": "Drug-drug interaction files from DDInter 2.0 across therapeutic categories (alimentary, antineoplastic, antiparasitic, blood, dermatological, hormonal, respiratory, various).<br><br><span style='color:#8b949e;font-size:11px'>Files (8): DDInter Alimentary, DDInter Antineoplastic, DDInter Antiparasitic, DDInter Blood + 4 more</span>"}, {"id": "DBG_DepMap_CRISPR", "label": "DepMap CRISPR", "type": "data", "r": 11, "desc": "Broad DepMap gene dependency scores, CRISPR gene effects, cancer model metadata, and gene expression for cancer cell lines.<br><br><span style='color:#8b949e;font-size:11px'>Files (4): DepMap Gene Dependency, DepMap Gene Effect, DepMap Models, DepMap Expression</span>"}, {"id": "DBG_Gene_Sets__MSigDB_MouseMine_GO_", "label": "Gene Sets\n(MSigDB/MouseMine/GO)", "type": "data", "r": 11, "desc": "Human and mouse gene set collections: MSigDB (hallmarks, oncogenic, immunologic, cell type, ontology, positional, curated, TF targets) and MouseMine equivalents, plus GO-plus.<br><br><span style='color:#8b949e;font-size:11px'>Files (17): Gene Ontology, MouseMine Positional, MouseMine Curated, MouseMine Regulatory + 13 more</span>"}, {"id": "DBG_Disease_Associations__DisGeNET_OMIM_HPO_", "label": "Disease Associations\n(DisGeNET/OMIM/HPO)", "type": "data", "r": 11, "desc": "Gene-disease associations from DisGeNET, genetic disorders from OMIM, and Human Phenotype Ontology (HPO).<br><br><span style='color:#8b949e;font-size:11px'>Files (3): DisGeNET, Human Phenotype Ontology, OMIM</span>"}, {"id": "DBG_PPI_Networks", "label": "PPI Networks", "type": "data", "r": 11, "desc": "Protein-protein interactions: affinity capture MS/RNA, co-fractionation, proximity labeling MS, reconstituted complexes, yeast two-hybrid, synthetic lethality/rescue/growth defect, virus-host (P-HIPSTER), genetic interactions.<br><br><span style='color:#8b949e;font-size:11px'>Files (12): Affinity Capture MS, Affinity Capture RNA, Co-Fractionation PPI, Dosage Growth Defect + 8 more</span>"}, {"id": "DBG_Drug_Discovery__BindingDB_Broad_EveBio_", "label": "Drug Discovery\n(BindingDB/Broad/EveBio)", "type": "data", "r": 11, "desc": "Drug binding affinities (BindingDB), Broad Drug Repurposing Hub molecules and targets, Enamine REAL library, EveBio pharmome assay/compound/result tables.<br><br><span style='color:#8b949e;font-size:11px'>Files (12): BindingDB, Broad Hub Molecules, Broad Hub Targets, Enamine Library + 8 more</span>"}, {"id": "DBG_GWAS___Variants__GeneBass_", "label": "GWAS / Variants\n(GeneBass)", "type": "data", "r": 11, "desc": "GWAS Catalog association results, GeneBass missense/pLoF/synonymous variant annotations, and general variant table.<br><br><span style='color:#8b949e;font-size:11px'>Files (5): GeneBass Missense, GeneBass pLoF, GeneBass Synonymous, GWAS Catalog + 1 more</span>"}, {"id": "DBG_miRNA_Databases", "label": "miRNA Databases", "type": "data", "r": 11, "desc": "miRDB predicted targets, miRTarBase experimentally validated interactions (with PubMed abstracts and binding sites).<br><br><span style='color:#8b949e;font-size:11px'>Files (4): miRDB Targets, miRTarBase Interactions, miRTarBase PubMed, miRTarBase Sites</span>"}, {"id": "DBG_Drug_Repurposing__TxGNN_", "label": "Drug Repurposing\n(TxGNN)", "type": "data", "r": 11, "desc": "TxGNN drug repurposing name mapping and predictions for disease-drug associations.<br><br><span style='color:#8b949e;font-size:11px'>Files (2): TXGNN Name Map, TXGNN Predictions</span>"}, {"id": "DBG_Cell___Immune_Resources", "label": "Cell & Immune\nResources", "type": "data", "r": 11, "desc": "McPAS TCR sequences, cell type marker genes, CZI Cell Census datasets, GTEx tissue expression, Protein Atlas, sgRNA knockout data (human + mouse), gene info, precision medicine knowledge graph.<br><br><span style='color:#8b949e;font-size:11px'>Files (9): CZI Cell Census, Gene Info, GTEx Expression, Precision Medicine KG + 5 more</span>"}, {"id": "SS_immune_aging_tf_signatures_major_celltypes_csv", "label": "Aging TF Signatures \u2014 Major", "type": "sumstat", "r": 13, "desc": "Per-TF aging statistics across 5 major immune cell types (CD4T, CD8T, NK, B, MONO) from multi-cohort TF activity analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style='color:#8b949e;font-size:11px'>Load: <code>retrieve_summary_stats('aging')</code></span>"}, {"id": "SS_immune_aging_tf_signatures_minor_celltypes_csv", "label": "Aging TF Signatures \u2014 Minor", "type": "sumstat", "r": 13, "desc": "Per-TF aging statistics across 11 minor (sub) immune cell types (CD16_NK, Classic_MONO, MAIT, Memory_B, Naive_B, NonClassic_MONO, Tcm_Naive_CD4, Tcm_Naive_CD8, Tem_Effector_CD4, Tem_Temra_CD8, Tem_Trm_CD8) from multi-cohort TF activity analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style='color:#8b949e;font-size:11px'>Load: <code>retrieve_summary_stats('aging', cell_resolution='minor')</code></span>"}, {"id": "SS_immune_aging_gene_expression_signatures_major_celltypes_csv", "label": "Aging Gene Expression Signatures", "type": "sumstat", "r": 13, "desc": "Per-gene aging statistics across 5 major immune cell types from multi-cohort bulk gene expression analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style='color:#8b949e;font-size:11px'>Load: <code>retrieve_summary_stats('aging', feature_type='gene_expression')</code></span>"}, {"id": "SS_immune_aging_ccc_signatures_major_celltypes_csv", "label": "Aging Cell-Cell Communication", "type": "sumstat", "r": 13, "desc": "Cell-cell communication (L-R pair) aging statistics across major immune cell types (LIANA rank_aggregate). The `gene` column encodes interactions as `source_ct__ligand__target_ct__receptor` (double underscore) \u2014 parse in your analysis.<br><span style='color:#8b949e;font-size:11px'>Load: <code>retrieve_summary_stats('aging', feature_type='ccc')</code></span>"}, {"id": "SS_sle_tf_signatures_major_celltypes_csv", "label": "SLE TF Signatures", "type": "sumstat", "r": 13, "desc": "Differential TF activity statistics for SLE vs healthy across 5 major immune cell types (Perez cohort).<br><span style='color:#8b949e;font-size:11px'>Load: <code>retrieve_summary_stats('sle')</code></span>"}, {"id": "SS_drug_tf_signatures_major_immune_celltypes_csv", "label": "Drug TF Signatures", "type": "sumstat", "r": 13, "desc": "145 named drug perturbations (vs DMSO) differential TF activity from the OP ex-vivo drug study across 5 major immune cell types. Drug names (`condition` / `comparison`): `5-(9-Isopropyl-8-methyl-2-morpholino-9H-purin-6-yl)pyrimidin-2-amine`, `ABT-199 (GDC-0199)`, `ABT737`, `AMD-070 (hydrochloride)`, `AT 7867`, `AT13387`, `AVL-292`, `AZ628`, `AZD-8330`, `AZD3514`, `AZD4547`, `Alogliptin`, `Amiodarone`, `Atorvastatin`, `Azacitidine`, `BAY 61-3606`, `BAY 87-2243`, `BI-D1870`, `BMS-265246`, `BMS-387032`, `BMS-536924`, `BMS-777607`, `BX 912`, `Belinostat`, `Bosutinib`, `Buspirone`, `CC-401`, `CEP-18770 (Delanzomib)`, `CEP-37440`, `CGM-097`, `CGP 60474`, `CHIR-99021`, `Cabozantinib`, `Canertinib`, `Ceritinib`, `Chlorpheniramine`, `Clemastine`, `Clomipramine`, `Clotrimazole`, `Colchicine`, `Colforsin`, `Crizotinib`, `Dabrafenib`, `Dactolisib`, `Dasatinib`, `Decitabine`, `Defactinib`, `Desloratadine`, `Disulfiram`, `Dovitinib`, `Doxorubicin`, `FK 866`, `Flutamide`, `Foretinib`, `GLPG0634`, `GO-6976`, `GSK-1070916`, `GSK256066`, `GW843682X`, `Ganetespib (STA-9090)`, `HMN-214`, `HYDROXYUREA`, `I-BET151`, `IKK Inhibitor VII`, `IMD-0354`, `IN1451`, `Idelalisib`, `Imatinib`, `Isoniazid`, `Ixabepilone`, `K-02288`, `Ketoconazole`, `LDN 193189`, `LY2090314`, `Lamivudine`, `Lapatinib`, `Linagliptin`, `MGCD-265`, `MK-5108`, `MLN 2238`, `Masitinib`, `Methotrexate`, `Midostaurin`, `Mometasone Furoate`, `Mubritinib (TAK 165)`, `Navitoclax`, `Nefazodone`, `Nilotinib`, `O-Demethylated Adapalene`, `OSI-930`, `Oprozomib (ONX 0912)`, `Oxybenzone`, `PD-0325901`, `PF-03814735`, `PF-04691502`, `PRT-062607`, `Palbociclib`, `Penfluridol`, `Perhexiline`, `Phenylbutazone`, `Pitavastatin Calcium`, `Pomalidomide`, `Porcn Inhibitor III`, `Prednisolone`, `Proscillaridin A;Proscillaridin-A`, `Protriptyline`, `Quizartinib`, `R428`, `RG7090`, `RG7112`, `RN-486`, `RVX-208`, `Raloxifene`, `Resminostat`, `Ricolinostat`, `Riociguat`, `Ruxolitinib`, `SB525334`, `SCH-58261`, `SLx-2119`, `STK219801`, `Saracatinib`, `Scriptaid`, `Selumetinib`, `Sgc-cbp30`, `Sunitinib`, `TGX 221`, `TIE2 Kinase Inhibitor`, `TL_HRAS26`, `TPCA-1`, `TR-14035`, `Tacalcitol`, `Tamatinib`, `Tipifarnib`, `Tivantinib`, `Tivozanib`, `Topotecan`, `Tosedostat`, `Trametinib`, `Vandetanib`, `Vanoxerine`, `Vardenafil`, `Vorinostat`, `YK 4-279`, `UNII-BXU45ZH6LI`.<br><span style='color:#8b949e;font-size:11px'>Load: <code>retrieve_summary_stats('drug')</code></span>"}, {"id": "SS_cyt nology + immune aging clock"}, {"id": "IMG_rapids_sif", "label": "rapids.sif", "type": "image", "r": 17, "desc": "GPU-accelerated tasks (RAPIDS, CellTypist GPU)"}];

, "target": "SS_drug_tf_signatures_major_immune_celltypes_csv", "type": "default"}, {"source": "T_CIIM_hiara", "target": "SS_cytokine_tf_signatures_major_immune_celltypes_csv", "type": "default"}, {"source": "T_CIIM_hiara", "target": "SS_immune_gene_regulatory_networks_major_cts_csv", "type": "default"}, {"source": "CAT_SUMSTATS", "target": "T_CIIM_virtualbiotech", "type": "default"}, {"source": "T_CIIM_virtualbiotech", "target": "SS_virtualbiotech_target_sc_features_csv", "type": "default"}, {"source": "T_CIIM_virtualbiotech", "target": "SS_virtualbiotech_target_clinical_success_overall_csv", "type": "default"}, {"source": "T_CIIM_virtualbiotech", "target": "SS_virtualbiotech_target_clinical_success_by_disease_csv", "type": "default"}, {"source": "CAT_KNOWHOW", "target": "KH_computing_sbatch", "type": "default"}, {"source": "CAT_KNOWHOW", "target": "KH_drug_screening", "type": "default"}, {"source": "CAT_KNOWHOW", "target": "KH_single_cell_rna_analysis", "type": "default"}];

const W = window.innerWidth, H = window.innerHeight;
let showLabels = true;

const colorMap = {
  core:       '#ff7b72',
  category:   '#79c0ff',
  tool_group: '#a3d977',
  tool:       '#56d364',
  tool_ciim:  '#3fb950',
  data_cat:   '#ffa657',
  data:       '#e3b341',
  sumstat:    '#f778ba',
  knowhow:    '#d2a8ff',
  image:      '#f0883e',
};
const strokeMap = {
  core:       '#ff4444',
  category:   '#1f6feb',
  tool_group: '#4a9a22',
  tool:       '#238636',
  tool_ciim:  '#196127',
  data_cat:   '#d86a00',
  data:       '#9e7500',
  sumstat:    '#c4347a',
  knowhow:    '#8b5cf6',
  image:      '#c0622d',
};
const typeLabel = {
  core:'LLM Core', category:'Category', tool_group:'Tool Suite',
  tool:'biomni Tool', tool_ciim:'CIIM Tool',
  data_cat:'Data Category', data:'Dataset',
  sumstat:'Summary Stats File',
  knowhow:'Know-How Guide', image:'Singularity Image',
};

const svg = d3.select('#graph');
const g   = svg.append('g');

const zoom = d3.zoom().scaleExtent([0.15, 4])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// Glow filter
const defs = svg.append('defs');
const glow = defs.append('filter').attr('id','glow');
glow.append('feGaussianBlur').attr('stdDeviation','5').attr('result','coloredBlur');
const fm = glow.append('feMerge');
fm.append('feMergeNode').attr('in','coloredBlur');
fm.append('feMergeNode').attr('in','SourceGraphic');

function linkDistance(d) {
  const tt = typeof d.target === 'object' ? d.target.type : NODES.find(n=>n.id===d.target)?.type;
  if (d.type === 'category') return 200;
  if (tt === 'tool_group' || tt === 'data_cat') return 140;
  if (tt === 'tool' || tt === 'tool_ciim') return 95;
  if (tt === 'data') return 80;
  if (tt === 'knowhow') return 110;
  if (tt === 'image') return 120;
  return 100;
}
function chargeStrength(d) {
  if (d.type === 'core')       return -1600;
  if (d.type === 'category')   return -700;
  if (d.type === 'tool_group') return -400;
  if (d.type === 'data_cat')   return -350;
  return -200;
}

const simulation = d3.forceSimulation(NODES)
  .force('link', d3.forceLink(LINKS).id(d=>d.id).distance(linkDistance).strength(0.55))
  .force('charge', d3.forceManyBody().strength(chargeStrength))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide().radius(d => d.r + 20));

const link = g.append('g').selectAll('line').data(LINKS).join('line')
  .attr('class', d => 'link' + (d.type==='category' ? ' link-category' : d.type==='dependency' ? ' link-dependency' : ''))
  .attr('stroke', d => d.type==='dependency' ? '#58a6ff' : d.type==='category' ? '#79c0ff' : '#484f58')
  .attr('stroke-width', d => d.type==='category' ? 2.5 : d.type==='dependency' ? 1.5 : 1);

const node = g.append('g').selectAll('g').data(NODES).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on('mouseover', showTip)
  .on('mousemove', moveTip)
  .on('mouseout',  hideTip);

node.append('circle')
  .attr('r', d => d.r)
  .attr('fill', d => colorMap[d.type] + 'cc')
  .attr('stroke', d => strokeMap[d.type])
  .attr('filter', d => d.type==='core' ? 'url(#glow)' : null);

// Function count badge ring for tool nodes
node.filter(d => d.nfuncs > 0)
  .append('circle')
  .attr('r', d => d.r + 4)
  .attr('fill', 'none')
  .attr('stroke', d => colorMap[d.type])
  .attr('stroke-width', 1)
  .attr('stroke-opacity', 0.4)
  .attr('stroke-dasharray', d => {
    const circ = 2 * Math.PI * (d.r + 4);
    const filled = (d.nfuncs / 40) * circ;
    return `${Math.min(filled, circ)} ${circ}`;
  });

node.append('text')
  .attr('class','node-label')
  .attr('text-anchor','middle')
  .attr('dominant-baseline','central')
  .attr('fill', d => d.type==='core' ? '#0d1117' : '#e6edf3')
  .attr('font-size', d => d.type==='core' ? '13px' : d.type==='category' ? '11px' : d.r > 18 ? '10px' : '8px')
  .attr('font-weight', d => ['core','category','tool_group'].includes(d.type) ? '700' : '500')
  .each(function(d) {
    const lines = d.label.split('\n');
    const lh = d.type==='core' ? 15 : 10;
    const el = d3.select(this);
    const offset = -(lines.length - 1) * lh / 2;
    lines.forEach((ln, i) => {
      el.append('tspan').attr('x',0).attr('dy', i===0 ? offset+'px' : lh+'px').text(ln);
    });
  });

simulation.on('tick', () => {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform', d=>`translate(${d.x},${d.y})`);
});

// ── Tooltip
function showTip(event, d) {
  const tt = document.getElementById('tooltip');
  const color = colorMap[d.type];
  const raw = d.label.replace(/\n/g,' ');
  tt.innerHTML = `
    <div class="tt-title">${raw}</div>
    <span class="tt-badge" style="background:${color}33;color:${color}">${typeLabel[d.type]||d.type}</span>
    <div class="tt-desc">${d.desc||''}</div>
  `;
  tt.style.display = 'block';
  moveTip(event);
}
function moveTip(event) {
  const tt = document.getElementById('tooltip');
  const x = event.pageX + 16, y = event.pageY - 12;
  tt.style.left = Math.min(x, window.innerWidth - tt.offsetWidth - 12) + 'px';
  tt.style.top  = Math.max(y, 8) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display='none'; }

// ── Search / highlight
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { node.classed('dimmed', false); link.classed('dimmed', false); return; }
  const matched = new Set(NODES.filter(n =>
    (n.label||'').toLowerCase().includes(q) ||
    (n.desc||'').toLowerCase().includes(q) ||
    (n.module||'').toLowerCase().includes(q)
  ).map(n => n.id));
  // also include parents of matched
  LINKS.forEach(l => {
    const sid = typeof l.source==='object'?l.source.id:l.source;
    const tid = typeof l.target==='object'?l.target.id:l.target;
    if (matched.has(tid)) matched.add(sid);
  });
  node.classed('dimmed', d => !matched.has(d.id));
  link.classed('dimmed', d => {
    const sid = typeof d.source==='object'?d.source.id:d.source;
    const tid = typeof d.target==='object'?d.target.id:d.target;
    return !matched.has(sid) && !matched.has(tid);
  });
});

// ── Controls
function resetZoom() {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(0,0).scale(1));
}
function toggleLabels() {
  showLabels = !showLabels;
  d3.selectAll('.node-label').style('display', showLabels ? null : 'none');
}
function relaxAll() {
  NODES.forEach(d => { d.vx = (Math.random()-0.5)*80; d.vy = (Math.random()-0.5)*80; });
  simulation.alpha(0.5).restart();
}

simulation.alpha(1).restart();
</script>
</body>
