<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agentic Ecosystem Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    --bg:           #0d1117;
    --fg:           #e6edf3;
    --panel-bg:     rgba(22,27,34,0.95);
    --panel-bg2:    rgba(22,27,34,0.97);
    --border:       #30363d;
    --muted:        #8b949e;
    --desc-fg:      #c9d1d9;
    --input-bg:     #21262d;
    --btn-bg:       #21262d;
    --btn-hover:    #30363d;
    --title-color:  #58a6ff;
    --node-label:   #e6edf3;
    --node-core-fg: #0d1117;
    --shadow:       rgba(0,0,0,0.6);
  }
  body.light {
    --bg:           #ffffff;
    --fg:           #1f2328;
    --panel-bg:     rgba(246,248,250,0.97);
    --panel-bg2:    rgba(246,248,250,0.99);
    --border:       #d0d7de;
    --muted:        #57606a;
    --desc-fg:      #424a53;
    --input-bg:     #f6f8fa;
    --btn-bg:       #f6f8fa;
    --btn-hover:    #e8ecf0;
    --title-color:  #0969da;
    --node-label:   #1f2328;
    --node-core-fg: #ffffff;
    --shadow:       rgba(0,0,0,0.15);
  }
  body {
    background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; color: var(--fg); transition: background 0.3s, color 0.3s;
  }
  #title {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 700; color: var(--title-color);
    letter-spacing: 1px; pointer-events: none; z-index: 10;
    text-shadow: 0 0 20px rgba(88,166,255,0.4);
  }
  #legend {
    position: absolute; bottom: 18px; left: 18px;
    background: var(--panel-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; font-size: 12px; z-index: 10;
    color: var(--fg); transition: background 0.3s, border-color 0.3s;
  }
  #legend h4 { color: var(--muted); margin-bottom: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  #tooltip {
    position: absolute; pointer-events: none;
    background: var(--panel-bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px;
    font-size: 12px; max-width: 320px; line-height: 1.55;
    z-index: 100; display: none;
    box-shadow: 0 6px 24px var(--shadow);
    color: var(--fg); transition: background 0.3s, border-color 0.3s;
  }
  #tooltip .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
  #tooltip .tt-badge { display: inline-block; font-size: 10px; padding: 1px 7px;
    border-radius: 10px; margin-bottom: 6px; font-weight: 600; }
  #tooltip .tt-desc  { color: var(--desc-fg); }
  #controls { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 10; }
  #search-wrap { position: absolute; top: 16px; left: 16px; z-index: 10; }
  #search {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--fg);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; width: 180px;
    outline: none; transition: background 0.3s, border-color 0.3s, color 0.3s;
  }
  #search::placeholder { color: var(--muted); }
  button {
    background: var(--btn-bg); border: 1px solid var(--border); color: var(--fg);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: background 0.2s;
  }
  button:hover { background: var(--btn-hover); }
  svg { width: 100vw; height: 100vh; }
  .node { cursor: grab; }
  .node:active { cursor: grabbing; }
  .node circle { stroke-width: 2px; }
  .node text { pointer-events: none; user-select: none; }
  .link { stroke-opacity: 0.3; }
  .link-category { stroke-opacity: 0.55; }
  .node.dimmed circle { opacity: 0.15; }
  .node.dimmed text  { opacity: 0.1; }
  .link.dimmed { opacity: 0.05; }
  .expand-btn circle { cursor: pointer; }
  .expand-btn text { cursor: pointer; pointer-events: none; font-size: 11px; font-weight: 700; fill: #fff; }
  .node-leaf text { font-size: 8px; }
</style>
</head>

<div id="tooltip"></div>

  <div class="legend-item"><div class="legend-dot" style="background:#e3b341"></div><span>Dataset / Group</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#e879a0"></div><span>Stats Module</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#f778ba"></div><span>Summary Stats</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#d2a8ff"></div><span>Know-How</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div><span>Singularity Image</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#c9a227"></div><span>Expanded Leaf</span></div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--muted);font-size:10px">
    + badge = click to expand children
  </div>
</div>

ed Results", "desc": "Expanded results on evebio_summary_result_table with curve fit parameters and phase categories."}, {"label": "EveBio Observed Points", "desc": "Raw observed datapoints from all screening and profiling experiments."}, {"label": "EveBio Summary Results", "desc": "Succinct summary of results for each assay-compound combination."}, {"label": "EveBio Targets", "desc": "Target metadata with common identifiers from EveBio screening."}]}, {"id": "DBG_6", "label": "GWAS / Variants (GeneBass)", "type": "data", "r": 13, "desc": "5 files — GeneBass Missense, GeneBass pLoF, GeneBass Synonymous...<br><span style='color:#8b949e;font-size:11px'>(5 items: GeneBass Missense, GeneBass pLoF, GeneBass Synonymous, GWAS Catalog +1 more)</span>", "children": [{"label": "GeneBass Missense", "desc": "Filtered missense variants from GeneBass."}, {"label": "GeneBass pLoF", "desc": "Predicted loss-of-function variants from GeneBass."}, {"label": "GeneBass Synonymous", "desc": "Filtered synonymous variants from GeneBass."}, {"label": "GWAS Catalog", "desc": "Genome-wide association studies (GWAS) results."}, {"label": "Variant Table", "desc": "Annotated genetic variants table."}]}, {"id": "DBG_7", "label": "miRNA Databases", "type": "data", "r": 13, "desc": "4 files — miRDB Targets, miRTarBase Interactions, miRTarBase PubMed...<br><span style='color:#8b949e;font-size:11px'>(4 items: miRDB Targets, miRTarBase Interactions, miRTarBase PubMed, miRTarBase Sites)</span>", "children": [{"label": "miRDB Targets", "desc": "Predicted microRNA targets from miRDB."}, {"label": "miRTarBase Interactions", "desc": "Experimentally validated microRNA-target interactions from miRTarBase."}, {"label": "miRTarBase PubMed", "desc": "PubMed abstracts for microRNA-target interactions in miRTarBase."}, {"label": "miRTarBase Sites", "desc": "Binding sites of microRNAs on target genes from miRTarBase."}]}, {"id": "DBG_8", "label": "Drug Repurposing (TxGNN)", "type": "data", "r": 13, "desc": "2 files — TXGNN Name Map, TXGNN Predictions<br><span style='color:#8b949e;font-size:11px'>(2 items: TXGNN Name Map, TXGNN Predictions)</span>", "children": [{"label": "TXGNN Name Map", "desc": "Name mapping for TXGNN."}, {"label": "TXGNN Predictions", "desc": "Prediction data for TXGNN."}]}, {"id": "DBG_9", "label": "Cell & Immune Resources", "type": "data", "r": 13, "desc": "9 files — CZI Cell Census, Gene Info, GTEx Expression...<br><span style='color:#8b949e;font-size:11px'>(9 items: CZI Cell Census, Gene Info, GTEx Expression, Precision Medicine KG +5 more)</span>", "children": [{"label": "CZI Cell Census", "desc": "Datasets from the Chan Zuckerberg Initiative's Cell Census."}, {"label": "Gene Info", "desc": "Comprehensive gene information."}, {"label": "GTEx Expression", "desc": "Gene expression (TPM) across human tissues from GTEx."}, {"label": "Precision Medicine KG", "desc": "Precision medicine knowledge graph with 17,080 diseases and 4+ million relationships across biological scales."}, {"label": "Cell Type Markers", "desc": "Cell type marker genes for identification."}, {"label": "McPAS TCR", "desc": "T-cell receptor sequences and specificity data from McPAS database."}, {"label": "Protein Atlas", "desc": "Protein expression data from Human Protein Atlas."}, {"label": "Mouse sgRNA KO", "desc": "sgRNA knockout data for mouse."}, {"label": "Human sgRNA KO", "desc": "sgRNA knockout data for human."}]}, {"id": "DCAT_dice", "label": "🧬 DICE", "type": "data_cat", "r": 20, "desc": "Gene expression (TPM) and cis-eQTL data across 15 primary human immune cell subtypes."}, {"id": "DDICE_0", "label": "Expression", "type": "data", "r": 13, "desc": "<br><span style='color:#8b949e;font-size:11px'>(15 items: CD4 T cell, naive (resting), CD4 T cell, naive (TCR-activated), CD4 T cell, Th1, CD4 T cell, Th2 +11 more)</span>", "children": [{"label": "CD4 T cell, naive (resting)", "desc": "Unstimulated naive CD4+ T cells. Baseline state for naive CD4 T cell gene expression."}, {"label": "CD4 T cell, naive (TCR-activated)", "desc": "Naive CD4+ T cells stimulated via TCR + CD28. Built-in perturbation comparison against CD4_NAIVE for identifying the TCR activation gene program."}, {"label": "CD4 T cell, Th1", "desc": "In vitro differentiated Th1 effector cells (IFN-γ producing). Use to characterize the Th1 effector gene program."}, {"label": "CD4 T cell, Th2", "desc": "In vitro differentiated Th2 effector cells (IL-4/IL-13 producing)."}, {"label": "CD4 T cell, Th17", "desc": "In vitro differentiated Th17 effector cells (IL-17 producing)."}, {"label": "CD4 T cell, Th1/17 (Th1*)", "desc": "Intermediate Th1/Th17 cells co-producing IFN-γ and IL-17."}, {"label": "CD4 T cell, T follicular helper (Tfh)", "desc": "Tfh cells that support B cell responses in germinal centers."}, {"label": "CD4 T cell, naive Treg", "desc": "Naive (thymic) regulatory T cells. FOXP3+ suppressor lineage."}, {"label": "CD4 T cell, memory Treg", "desc": "Memory regulatory T cells. Antigen-experienced FOXP3+ suppressor lineage."}, {"label": "CD8 T cell, naive (resting)", "desc": "Unstimulated naive CD8+ T cells. Baseline for cytotoxic lineage."}, {"label": "CD8 T cell, naive (TCR-activated)", "desc": "Naive CD8+ T cells stimulated via TCR + CD28. Built-in perturbation comparison for the CD8 activation program."}, {"label": "B cell, naive", "desc": "Naive B cells. Baseline B cell gene expression."}, {"label": "NK cell, CD56dim CD16+", "desc": "Mature cytotoxic NK cells (CD56dim CD16-bright). The dominant NK subset in peripheral blood."}, {"label": "Monocyte, classical (CD14++)", "desc": "Classical inflammatory monocytes."}, {"label": "Monocyte, non-classical (CD16+)", "desc": "Non-classical patrolling monocytes."}]}, {"id": "DDICE_1", "label": "eQTL", "type": "data", "r": 13, "desc": "Cis-eQTL data in VCF format. SNPs with adjusted p-value < 0.05, raw p-value < 0.0001, TPM > 1.0. VCF INFO fields include Gene, GeneSymbol, Pvalue, Beta, ANOVA, FDR.<br><span style='color:#8b949e;font-size:11px'>(15 items: CD4_NAIVE.vcf, CD4_STIM.vcf, TH1.vcf, TH2.vcf +11 more)</span>", "children": [{"label": "CD4_NAIVE.vcf", "desc": "CD4 T cell, naive"}, {"label": "CD4_STIM.vcf", "desc": "CD4 T cell, naive activated"}, {"label": "TH1.vcf", "desc": "Th1"}, {"label": "TH2.vcf", "desc": "Th2"}, {"label": "TH17.vcf", "desc": "Th17"}, {"label": "THSTAR.vcf", "desc": "Th1/17"}, {"label": "TFH.vcf", "desc": "T follicular helper"}, {"label": "TREG_NAIVE.vcf", "desc": "Naive Treg"}, {"label": "TREG_MEM.vcf", "desc": "Memory Treg"}, {"label": "CD8_NAIVE.vcf", "desc": "CD8 T cell, naive"}, {"label": "CD8_STIM.vcf", "desc": "CD8 T cell, naive activated"}, {"label": "B_CELL_NAIVE.vcf", "desc": "Naive B cell"}, {"label": "NK.vcf", "desc": "NK cell"}, {"label": "MONOCYTES.vcf", "desc": "Classical monocyte"}, {"label": "M2.vcf", "desc": "Non-classical monocyte"}]}, {"id": "DCAT_kg", "label": "🕸️ KG", "type": "data_cat", "r": 20, "desc": "Large-scale knowledge graphs for biomedical reasoning."}, {"id": "DKG_0", "label": "PrimeKG — Precision Medicine Knowledge Graph", "type": "data", "r": 13, "desc": "A multiplex biomedical knowledge graph integrating 20 high-quality databases across 10 biological scales."}, {"id": "DCAT_nichenet", "label": "📡 NicheNet", "type": "data_cat", "r": 20, "desc": "NicheNet v2 prior model networks for cell-cell communication analysis."}, {"id": "DNN_0", "label": "Core Networks", "type": "data", "r": 13, "desc": "<br><span style='color:#8b949e;font-size:11px'>(3 items: Ligand-Receptor Network, Intracellular Signaling Network, Gene Regulatory Network)</span>", "children": [{"label": "Ligand-Receptor Network", "desc": "4,986 ligand-receptor pairs. Columns: `from` (ligand), `to` (receptor), `database`, `source`. Source databases include CellChat, CellPhoneDB, ICELLNET, NicheNet v1, connectomeDB2020, and others. This is the entry layer of the NicheNet prior: the set of all possible extracellular L-R interactions."}, {"label": "Intracellular Signaling Network", "desc": "5,169,518 directed edges. Columns: `from`, `to`, `source`, `database`. Represents the intracellular signaling paths that connect receptor activation to downstream molecules and TFs. Sources include OmniPath, Reactome, KEGG, PhosphoSitePlus, SIGNOR, and others. This is the middle layer: receptor → signaling cascade."}, {"label": "Gene Regulatory Network", "desc": "5,870,450 directed TF→target edges. Columns: `from` (TF), `to` (target gene), `source`, `database`. Represents the transcriptional regulation layer. Sources include DoRothEA, TRRUST, RegNetwork, ENCODE, and ChIP-Atlas. This is the final layer: TF → target gene expression."}]}, {"id": "DNN_1", "label": "Weighted Networks", "type": "data", "r": 13, "desc": "<br><span style='color:#8b949e;font-size:11px'>(3 items: Weighted Prior Network, Ligand → TF Weight Matrix, Ligand → Target Gene Weight Matrix (long format))</span>", "children": [{"label": "Weighted Prior Network", "desc": "The NicheNet prior model after empirical calibration. Edges from the signaling and GR networks are weighted by how well they predict observed gene expression changes in ~600 published perturbation experiments. Two tables: - `weighted_networks_lr_sig.parquet`: 3,923,501 weighted L-R + signaling edges (`from`, `to`, `weight`) - `weighted_networks_gr.parquet`: 4,640,268 weighted GR edges (`from`, `to`, `weight`)"}, {"label": "Ligand → TF Weight Matrix", "desc": "33,354 ligands × 1,226 TFs. Each value = how strongly a ligand is predicted to regulate a given TF, based on path traversal through the weighted prior network. Rows = ligands (with a `ligand` column added), columns = TF names. Use to identify which ligands most likely drive observed TF activity changes."}, {"label": "Ligand → Target Gene Weight Matrix (long format)", "desc": "34,326,358 rows. Columns: `ligand`, `target`, `weight`. Originally a 33,354 × 1,226 dense matrix, converted to long format (non-zero weights only) for efficient storage (353MB parquet vs. 250MB RDS). Each row = predicted regulatory influence of a ligand on a target gene. This is the primary output used in NicheNet ligand activity analysis."}]}, {"id": "DCAT_virtualbiotech", "label": "💊 VirtualBiotech", "type": "data_cat", "r": 20, "desc": "Data from the Virtual Biotech study (Zhang et al. 2026). Clinical trial outcomes and target-level biology."}, {"id": "DVB_0", "label": "Clinical Trial Outcome Labels", "type": "data", "r": 13, "desc": "56,707 clinical trials from ClinicalTrials.gov with LLM-curated outcome labels. The most valuable piece of the dataset — extracting these from raw trial text is what the paper's main contribution is. Columns include trial phase, status (Active/Terminated/Withdrawn/Suspended), stop reason and category, primary/secondary endpoint result (POSITIVE/NEGATIVE/MIXED/NA), Phase I→II progression flag, and adverse event rates by organ system."}, {"id": "DVB_1", "label": "ChEMBL NCT–Target Mapping", "type": "data", "r": 13, "desc": "488,361 rows mapping NCT trial IDs to drug targets (Ensembl gene IDs) and diseases (EFO IDs + disease name) via ChEMBL. The bridge between trial labels and gene-level biology. Key columns: `nct_id`, `targetId` (Ensembl), `diseaseId` (EFO), `disease_name`, `drugId` (ChEMBL), `phase`, `status`, `mechanism_of_action`."}, {"id": "DVB_2", "label": "SC Target Features", "type": "data", "r": 13, "desc": "Precomputed single-cell expression features for 1,511 human target genes derived from the Tabula Sapiens healthy human atlas. 127 columns covering cell-type and tissue specificity (tau), bimodality, cell-type-specific expression per 62 cell types, predicted AE risk per organ system, and composite attrition/safety risk scores. This is the gene-level feature table used in all regression analyses — see `summary_stats/virtualbiotech/target_sc_features.csv` for a leaner version with the key columns only."}, {"id": "DVB_3", "label": "Tahoe-100M Drug Efficacy Features", "type": "data", "r": 13, "desc": "2.9M rows of functional drug efficacy scores from the Tahoe-100M perturbation atlas — drugs tested across cancer cell lines at multiple concentrations. Long-format: one row per drug × cell line × concentration × feature. Feature types include pan-cancer functional scores (apoptosis, proliferation suppression, cell cycle arrest, DNA damage, stress response) and scores stratified by mutation context (KRAS/TP53/PIK3CA/BRAF mutant vs wild-type). **Cancer-only**; links drugs not targets directly. Not yet used in our analyses."}, {"id": "CAT_SUMSTATS", "label": "📈 Summary Stats", "type": "category", "r": 30, "desc": "Precomputed CIIM signature files: aging, SLE, drug, cytokine TF/GEX/CCC statistics and immune GRN models."}, {"id": "SS_hiara", "label": "HIaRA", "type": "sumstat_group", "r": 18, "desc": "Summary stats from the hiara module (8 files)."}, {"id": "SS_immune_aging_tf_signatures_major_celltypes_csv", "label": "Aging TF Signatures — Major", "type": "sumstat", "r": 13, "desc": "Per-TF aging statistics across 5 major immune cell types (CD4T, CD8T, NK, B, MONO) from multi-cohort TF activity analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style=\"color:#8b949e;font-size:11px\">Load: <code>retrieve_summary_stats('aging')</code></span>"}, {"id": "SS_immune_aging_tf_signatures_minor_celltypes_csv", "label": "Aging TF Signatures — Minor", "type": "sumstat", "r": 13, "desc": "Per-TF aging statistics across 11 minor (sub) immune cell types (CD16_NK, Classic_MONO, MAIT, Memory_B, Naive_B, NonClassic_MONO, Tcm_Naive_CD4, Tcm_Naive_CD8, Tem_Effector_CD4, Tem_Temra_CD8, Tem_Trm_CD8) from multi-cohort TF activity analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style=\"color:#8b949e;font-size:11px\">Load: <code>retrieve_summary_stats('aging', cell_resolution='minor')</code></span>"}, {"id": "SS_immune_aging_gene_expression_signatures_major_celltypes_csv", "label": "Aging Gene Expression Signatures", "type": "sumstat", "r": 13, "desc": "Per-gene aging statistics across 5 major immune cell types from multi-cohort bulk gene expression analysis (cohorts: onek1k, abf300, aida, perez_sle; healthy donors only).<br><span style=\"color:#8b949e;font-size:11px\">Load: <code>retrieve_summary_stats('aging', feature_type='gene_expression')</code></span>"}, {"id": "SS_immune_aging_ccc_signatures_major_celltypes_csv", "label": "Aging Cell-Cell Communication", "type": "sumstat", "r": 13, "desc": "Cell-cell communication (L-R pair) aging statistics across major immune cell types (LIANA rank_aggregate). The `gene` column encodes interactions as `source_ct__ligand__target_ct__receptor` (double underscore) — parse in your analysis.<br><span style=\"color:#8b949e;font-size:11px\">Load: <code>retrieve_summary_stats('aging', feature_type='ccc')</code></span>"}, {"id": "SS_sle_tf_signatures_major_celltypes_csv", "label": "SLE TF Signatures", "type": "sumstat", "r": 13, "desc": "Differential TF activity statistics for SLE vs healthy across 5 major immune cell types (Perez cohort).<br><span style=\"color:#8b949e;font-size:11px\">Load: <code>retrieve_summary_stats('sle')</code></span>"}, {"id": "SS_drug_tf_signatures_major_immune_celltypes_csv", "label": "Drug TF Signatures", "type": "sumstat", "r": 13, "desc": "145 named drug perturbations (vs DMSO) differential TF activity from the OP ex-vivo drug study across 5 major immune cell types. Drug names (`condition` / `comparison`): `5-(9-Isopropyl-8-methyl-2-morpholino-9H-purin-6-yl)pyrimidin-2-amine`, `ABT-199 (GDC-0199)`, `ABT737`, `AMD-070 (hydrochloride)`, `AT 7867`, `AT13387`, `AVL-292`, `AZ628`, `AZD-8330`, `AZD3514`, `AZD4547`, `Alogliptin`, `Amiodarone`, `Atorvastatin`, `Azacitidine`, `BAY 61-3606`, `BAY 87-2243`, `BI-D1870`, `BMS-265246`, `BMS-387032`, `BMS-536924`, `BMS-777607`, `BX 912`, `Belinostat`, `Bosutinib`, `Buspirone`, `CC-401`, `CEP-18770 (Delanzomib)`, `CEP-37440`, `CGM-097`, `CGP 60474`, `CHIR-99021`, `Cabozantinib`, `Canertinib`, `Ceritinib`, `C const svg = d3.select('#graph');
const g   = svg.append('g');

  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const defs = svg.append('defs');

glow.append('feGaussianBlur').attr('stdDeviation','5').attr('result','coloredBlur');
const fm = glow.append('feMerge');
fm.append('feMergeNode').attr('in','coloredBlur');
fm.append('feMergeNode').attr('in','SourceGraphic');

function linkDistance(d) {
  const tt = typeof d.target==='object' ? d.target.type : NODES.find(n=>n.id===d.target)?.type;
  if (d.type==='category') return 220;
  if (tt==='tool_group'||tt==='data_cat'||tt==='sumstat_group') return 150;
  if (tt==='tool'||tt==='tool_ciim') return 100;
  if (tt==='data') return 85;
  if (tt==='knowhow') return 120;
  if (tt==='image') return 130;
  if (tt==='sumstat') return 90;
  return 100;
}
function chargeStrength(d) {
  if (d.type==='core')       return -1800;
  if (d.type==='category')   return -800;
  if (d.type==='tool_group') return -450;
  if (d.type==='data_cat')   return -380;
  return -220;
}

const simulation = d3.forceSimulation(NODES)
  .force('link', d3.forceLink(LINKS).id(d=>d.id).distance(linkDistance).strength(0.55))
  .force('charge', d3.forceManyBody().strength(chargeStrength))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide().radius(d => d.r + 22));

const linkG = g.append('g');
const nodeG = g.append('g');

let allNodes = NODES.slice();
let allLinks = LINKS.slice();
const expanded = new Set();

const drag = d3.drag()
  .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
  .on('end',   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; });

function updateGraph() {
  const linkSel = linkG.selectAll('line').data(allLinks, d => {
    const s = typeof d.source==='object' ? d.source.id : d.source;
    const t = typeof d.target==='object' ? d.target.id : d.target;
    return s + '→' + t;
  });
  linkSel.exit().remove();
  const linkEnter = linkSel.enter().append('line')
    .attr('class', d => 'link' + (d.type==='category' ? ' link-category' : ''))
    .attr('stroke', d => d.type==='category' ? '#79c0ff' : d.type==='leaf' ? '#3fb950' : '#484f58')
    .attr('stroke-width', d => d.type==='category' ? 2.5 : d.type==='leaf' ? 1 : 1)
    .attr('stroke-opacity', d => d.type==='leaf' ? 0.5 : null);
  linkSel.merge(linkEnter);

  const nodeSel = nodeG.selectAll('g.node').data(allNodes, d => d.id);
  nodeSel.exit().transition().duration(200).style('opacity', 0).remove();

  const nodeEnter = nodeSel.enter().append('g')
    .attr('class', d => 'node' + (['func','data_file'].includes(d.type) ? ' node-leaf' : ''))
    .call(drag)
    .on('mouseover', showTip)
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  nodeEnter.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => (colorMap[d.type]||'#aaa') + 'cc')
    .attr('stroke', d => strokeMap[d.type]||'#555')
    .attr('filter', d => d.type==='core' ? 'url(#glow)' : null);

  // Badge ring for tool nodes (shows function count as arc)
  nodeEnter.filter(d => d.nfuncs > 0)
    .append('circle')
    .attr('r', d => d.r + 4)
    .attr('fill', 'none')
    .attr('stroke', d => colorMap[d.type])
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.4)
    .attr('stroke-dasharray', d => {
      const circ = 2 * Math.PI * (d.r + 4);
      const filled = (d.nfuncs / 40) * circ;
      return `${Math.min(filled, circ)} ${circ}`;
    });

  // Labels
  const labelFg = getComputedStyle(document.body).getPropertyValue('--node-label').trim();
  const coreFg  = getComputedStyle(document.body).getPropertyValue('--node-core-fg').trim();
  nodeEnter.append('text')
    .attr('class','node-label')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','central')
    .attr('fill', d => d.type==='core' ? coreFg : labelFg)
    .attr('font-size', d => d.type==='core' ? '13px' : d.type==='category' ? '11px' : ['func','data_file'].includes(d.type) ? '7.5px' : d.r > 18 ? '10px' : '8px')
    .attr('font-weight', d => ['core','category','tool_group'].includes(d.type) ? '700' : '500')
    .each(function(d) {
      const lines = d.label.split('\n');
      const lh = d.type==='core' ? 15 : 10;
      const el = d3.select(this);
      const offset = -(lines.length - 1) * lh / 2;
      lines.forEach((ln, i) => {
        el.append('tspan').attr('x',0).attr('dy', i===0 ? offset+'px' : lh+'px').text(ln);
      });
    });

  // Expand badge — any node that has children to expand
  nodeEnter.filter(d => d.children && d.children.length > 0)
    .append('g')
    .attr('class', 'expand-btn')
    .attr('transform', d => `translate(${d.r - 1}, ${-(d.r - 1)})`)
    .on('click', (e, d) => { e.stopPropagation(); toggleExpand(d); })
    .call(bg => {
      bg.append('circle').attr('r', 7)
        .attr('fill', d => colorMap[d.type] || '#56d364')
        .attr('stroke', d => strokeMap[d.type] || '#238636')
        .attr('stroke-width', 1.5);
      bg.append('text').attr('text-anchor','middle').attr('dominant-baseline','central').attr('dy','0.5px').text('+');
    });

  nodeSel.merge(nodeEnter);
  simulation.nodes(allNodes);
  simulation.force('link').links(allLinks);
  simulation.alpha(0.4).restart();
}

function toggleExpand(d) {
  const parentId = d.id;
  const kids     = d.children || [];
  const isTool   = d.type === 'tool' || d.type === 'tool_ciim';
  const leafType = isTool ? 'func' : 'data_file';

  if (expanded.has(parentId)) {
    expanded.delete(parentId);
    const childIds = new Set(kids.map((_, i) => `LEAF_${parentId}_${i}`));
    allNodes = allNodes.filter(n => !childIds.has(n.id));
    allLinks = allLinks.filter(l => {
      const s = typeof l.source==='object' ? l.source.id : l.source;
      const t = typeof l.target==='object' ? l.target.id : l.target;
      return !(childIds.has(s) || childIds.has(t));
    });
    nodeG.selectAll('g.node').filter(n => n.id === parentId)
      .select('.expand-btn text').text('+');
  } else {
    expanded.add(parentId);
    const angle  = (2 * Math.PI) / kids.length;
    const spread = d.r + 55;
    kids.forEach((child, i) => {
      const nid   = `LEAF_${parentId}_${i}`;
      const theta = i * angle - Math.PI / 2;
      allNodes.push({
        id:    nid,
        label: child.label || '',
        type:  leafType,
        r:     9,
        desc:  child.desc || '',
        x:     d.x + spread * Math.cos(theta),
        y:     d.y + spread * Math.sin(theta),
      });
      allLinks.push({ source: parentId, target: nid, type: 'leaf' });
    });
    nodeG.selectAll('g.node').filter(n => n.id === parentId)
      .select('.expand-btn text').text('−');
  }
  updateGraph();
}

simulation.on('tick', () => {
  linkG.selectAll('line')
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.selectAll('g.node').attr('transform', d=>`translate(${d.x},${d.y})`);
});

function showTip(event, d) {
  const tt    = document.getElementById('tooltip');
  const color = colorMap[d.type] || '#aaa';
  const raw   = d.label.replace(/\n/g,' ');
  tt.innerHTML = `
    <div class="tt-title">${raw}</div>
    <span class="tt-badge" style="background:${color}33;color:${color}">${typeLabel[d.type]||d.type}</span>
    <div class="tt-desc">${d.desc||''}</div>
  `;
  tt.style.display = 'block';
  moveTip(event);
}
function moveTip(event) {
  const tt = document.getElementById('tooltip');
  const x  = event.pageX + 16, y = event.pageY - 12;
  tt.style.left = Math.min(x, window.innerWidth - tt.offsetWidth - 12) + 'px';
  tt.style.top  = Math.max(y, 8) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display='none'; }

const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    nodeG.selectAll('g.node').classed('dimmed', false);
    linkG.selectAll('line').classed('dimmed', false);
    return;
  }
  const matched = new Set(allNodes.filter(n =>
    (n.label||'').toLowerCase().includes(q) ||
    (n.desc||'').toLowerCase().includes(q) ||
    (n.module||'').toLowerCase().includes(q)
  ).map(n => n.id));
  allLinks.forEach(l => {
    const sid = typeof l.source==='object' ? l.source.id : l.source;
    const tid = typeof l.target==='object' ? l.target.id : l.target;
    if (matched.has(tid)) matched.add(sid);
  });
  nodeG.selectAll('g.node').classed('dimmed', d => !matched.has(d.id));
  linkG.selectAll('line').classed('dimmed', d => {
    const sid = typeof d.source==='object' ? d.source.id : d.source;
    const tid = typeof d.target==='object' ? d.target.id : d.target;
    return !matched.has(sid) && !matched.has(tid);
  });
});

function resetZoom() {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(0,0).scale(1));
}
function toggleLabels() {
  showLabels = !showLabels;
  d3.selectAll('.node-label').style('display', showLabels ? null : 'none');
}
function relaxAll() {
  allNodes.forEach(d => { d.vx=(Math.random()-0.5)*80; d.vy=(Math.random()-0.5)*80; });
  simulation.alpha(0.5).restart();
}
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '🌙 Dark' : '☀️ Light';
  const labelFg = getComputedStyle(document.body).getPropertyValue('--node-label').trim();
  const coreFg  = getComputedStyle(document.body).getPropertyValue('--node-core-fg').trim();
  d3.selectAll('.node-label').attr('fill', d => d.type==='core' ? coreFg : labelFg);
}

updateGraph();
simulation.alpha(1).restart();
</script>
</body>
